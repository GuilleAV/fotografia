version: '3.8'

services:
  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: foto-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: portfolio_fotografo
      MYSQL_USER: fotografo
      MYSQL_PASSWORD: foto123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./portfolio-backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend (Java EE 8 - GlassFish/Payara)
  # ============================================
  # Descomentar cuando tengas la imagen del backend lista
  #
  # backend:
  #   build:
  #     context: ./backend-fotografo
  #     dockerfile: Dockerfile
  #   container_name: foto-backend
  #   restart: unless-stopped
  #   environment:
  #     - DB_HOST=mysql
  #     - DB_PORT=3306
  #     - DB_NAME=portfolio_fotografo
  #     - DB_USER=fotografo
  #     - DB_PASSWORD=foto123
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #   volumes:
  #     - uploads:/root/portfolio-uploads

  # ============================================
  # phpMyAdmin (opcional, para gestionar la BD)
  # ============================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: foto-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root123
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  mysql-data:
  uploads:
