# =========================
# HTTP -> HTTPS redirect
# =========================
server {
    listen 80;
    server_name sentirfotografico.com.ar www.sentirfotografico.com.ar;
    return 301 https://$host$request_uri;
}

# =========================
# HTTPS app
# =========================
server {
    listen 443 ssl http2;
    server_name sentirfotografico.com.ar www.sentirfotografico.com.ar;

    # Certificados (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sentirfotografico.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentirfotografico.com.ar/privkey.pem;

    # Frontend Angular (build prod)
    root /var/www/sentirfotografico/frontend/browser;
    index index.html;

    # Archivos estáticos con cache largo
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API -> GlassFish (WAR: /portfolio-backend + web.xml /api/*)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/portfolio-backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
