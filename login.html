<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Adrián Morales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">Adrián Morales</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="categorias.html">Categorías</a></li>
        <li><a href="index.html#contacto">Contacto</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
      <div class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
    </nav>
  </header>

  <div class="login-container">
    <div class="login-box">
      <h2>Acceso Administrador</h2>
      <form onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>Usuario</label>
          <input id="username" type="text" placeholder="Ingrese su usuario" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input id="password" type="password" placeholder="Ingrese su contraseña" required>
        </div>
        <button type="submit" class="login-btn">Iniciar Sesión</button>
        <p id="loginError" class="error-message" style="display:none;">⚠️ Usuario o contraseña incorrectos</p>
      </form>
      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="dashboard.html" style="color: #3498db; text-decoration: none;">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
