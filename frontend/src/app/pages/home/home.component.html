@if (loading()) {
  <section class="page-shell">
    <div class="container loading-grid">
      @for (_ of [1, 2, 3, 4, 5, 6, 7, 8]; track _) {
        <app-skeleton height="220px" />
      }
    </div>
  </section>
} @else if (error()) {
  <section class="page-shell">
    <div class="container card-surface home-empty">
      <p>{{ error() }}</p>
    </div>
  </section>
} @else {
  <section class="hero-shell">
    @if (heroFoto()) {
      <button type="button" class="hero-link" (click)="abrirLightbox(0)" aria-label="Abrir fotografía destacada">
        <img [src]="heroFoto() | fotoImagenUrl:'web'" [alt]="heroFoto()!.titulo" />
      </button>
    }
  </section>

  <section class="home-mosaic page-shell">
    <div class="container">
      <div class="mosaic-grid">
        @for (foto of fotosMosaico(); track foto.idFoto; let i = $index) {
          <button
            type="button"
            class="mosaic-item"
            [class.wide]="i % 7 === 0"
            [class.tall]="i % 5 === 0"
            (click)="abrirLightbox(i + 1)"
            [attr.aria-label]="'Abrir foto ' + foto.titulo"
          >
            <img [src]="foto | fotoImagenUrl:'web'" [alt]="foto.titulo" loading="lazy" />
          </button>
        }
      </div>
    </div>
  </section>
}

@if (lightboxOpen() && fotoActual()) {
  <div
    class="home-lightbox"
    tabindex="0"
    (click)="cerrarLightbox()"
    (keydown.escape)="cerrarLightbox()"
    (keydown.arrowleft)="irAnterior()"
    (keydown.arrowright)="irSiguiente()"
  >
    <button class="lightbox-close" type="button" (click)="cerrarLightbox(); $event.stopPropagation()" aria-label="Cerrar">
      ✕
    </button>

    @if (contador()) {
      <div class="lightbox-counter" (click)="$event.stopPropagation()">{{ contador() }}</div>
    }

    <button class="lightbox-nav left" type="button" [disabled]="!puedeIrAnterior()" (click)="irAnterior(); $event.stopPropagation()" aria-label="Foto anterior">
      ‹
    </button>

    <div class="lightbox-stage" (click)="$event.stopPropagation()" (touchstart)="onTouchStart($event)" (touchend)="onTouchEnd($event)">
      <img [src]="fotoActual() | fotoImagenUrl:'web'" [alt]="fotoActual()!.titulo" />
    </div>

    <button class="lightbox-nav right" type="button" [disabled]="!puedeIrSiguiente()" (click)="irSiguiente(); $event.stopPropagation()" aria-label="Foto siguiente">
      ›
    </button>
  </div>
}
