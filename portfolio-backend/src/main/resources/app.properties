# ============================================
# App runtime configuration (safe defaults)
# ============================================

# URL pública del backend (usada para urlCompleta en respuestas)
APP_PUBLIC_API_BASE_URL=http://localhost:8080/portfolio-backend/api

# URL base del frontend (usada en links enviados por email)
APP_FRONTEND_BASE_URL=http://localhost:4200

# Directorio base para uploads en disco
# Dejar vacío para usar default del sistema (user.home/portfolio-uploads)
APP_UPLOAD_DIR=

# CORS (orígenes permitidos, separados por coma)
APP_CORS_ALLOWED_ORIGINS=http://localhost:4200,http://127.0.0.1:4200,https://sentirfotografico.com.ar,https://www.sentirfotografico.com.ar

# JWT (reemplazar en producción con variable de entorno o -DAPP_JWT_SECRET)
APP_JWT_SECRET=CHANGE_ME_IN_PRODUCTION_WITH_A_LONG_RANDOM_SECRET
APP_JWT_EXPIRATION_MS=86400000
