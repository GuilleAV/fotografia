# Configuración base de correo (sin secretos)
# Prioridad final de valores:
# 1) Variables APP_SMTP_* (recomendado en producción)
# 2) email.local.properties (local, ignorado por git)
# 3) este archivo

mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.ssl.enable=false
mail.smtp.starttls.enable=true
mail.smtp.ssl.trust=smtp.gmail.com

# Definir en email.local.properties o APP_SMTP_USER / APP_SMTP_PASSWORD
mail.user=
mail.password=
